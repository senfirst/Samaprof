<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Samaprof - cherche ton prof, trouve des élèves.</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:linear-gradient(to bottom,#eef2f7,#dfe6ee);
}

header{
background:linear-gradient(135deg,#0d47a1,#1976d2);
color:white;
padding:40px;
text-align:center;
}

.logo{
width:80px;
margin-bottom:10px;
border-radius:50%;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

nav{
background:#0b3d91;
padding:10px;
display:flex;
overflow-x:auto;
}

nav a{
color:white;
padding:10px;
cursor:pointer;
white-space:nowrap;
}

/* SECTION */

.section{
display:none;
padding:30px;
animation:fade 0.3s ease;
}

.active{
display:block;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.container{
max-width:1100px;
margin:auto;
}

.card{
background:white;
padding:20px;
margin:20px 0;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:linear-gradient(135deg,#0d47a1,#1976d2);
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

/* PROF */

.profCard{
background:white;
padding:15px;
border-radius:12px;
margin:15px 0;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
display:flex;
gap:15px;
align-items:center;
}

.profCard img{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:2px solid #0d47a1;
}

/* CHAT */

.chatBox{
border:1px solid #ccc;
height:250px;
overflow-y:auto;
padding:10px;
margin-bottom:10px;
background:#fafafa;
}

.message{
padding:8px;
background:#e3f2fd;
margin:5px 0;
border-radius:5px;
}

/* REVIEW */

.review{
background:#fff8e1;
padding:10px;
margin:10px 0;
border-radius:5px;
}

footer{
background:#0d47a1;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>
<img src="logo.jpeg" alt="Samaprof Logo" class="logo">
<h1>🎓 Samaprof</h1>
<p>Trouvez un professeur facilement</p>
</header>

<nav>
<a onclick="showSection('home')">Accueil</a>
<a onclick="showSection('search')">Chercher</a>
<a onclick="showSection('prof')">Prof</a>
<a onclick="showSection('chat')">Chat</a>
<a onclick="showSection('reviews')">Avis</a>
<a onclick="showSection('dashboard')">Dashboard</a>
</nav>

<!-- HOME -->

<section id="home" class="section active">
<div class="container">
<div class="card">
<h2>Bienvenue 👋</h2>
<p>Plateforme sénégalaise de cours</p>
</div>
</div>
</section>

<!-- SEARCH -->

<section id="search" class="section">
<div class="container">
<h2>🔎 Recherche</h2>

<input id="searchInput" placeholder="Nom, matière ou ville">

<div id="profResults"></div>
</div>
</section>

<!-- PROF -->

<section id="prof" class="section">
<div class="container">

<h2>👨‍🏫 Ajouter un prof</h2>

<input id="profName" placeholder="Nom">
<input id="profSubject" placeholder="Matière">
<input id="profCity" placeholder="Ville">
<input id="profPrice" placeholder="Prix">
<input id="profWhatsapp" placeholder="WhatsApp">

<input type="file" id="profPhoto" accept="image/*">
<img id="preview" style="width:80px;border-radius:50%;display:none;margin-top:10px;">

<button onclick="addProf()">Publier</button>

</div>
</section>

<!-- CHAT -->

<section id="chat" class="section">
<div class="container">
<h2>💬 Chat</h2>

<div class="chatBox" id="chatBox"></div>
<input id="chatInput" placeholder="Message">
<button onclick="sendMessage()">Envoyer</button>

</div>
</section>

<!-- REVIEWS -->

<section id="reviews" class="section">
<div class="container">
<h2>⭐ Avis</h2>

<input id="reviewName" placeholder="Nom">
<textarea id="reviewText" placeholder="Avis"></textarea>
<button onclick="addReview()">Publier</button>

<div id="reviewList"></div>

</div>
</section>

<!-- DASHBOARD -->

<section id="dashboard" class="section">
<div class="container">

<div class="grid">
<div class="card">
<h3>Professeurs</h3>
<p id="countProf">0</p>
</div>

<div class="card">
<h3>Avis</h3>
<p id="countReview">0</p>
</div>
</div>

</div>
</section>

<footer>
Samaprof © 2026
</footer>

<script>

/* NAVIGATION */

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* DATA */

let profs=JSON.parse(localStorage.getItem("profs"))||[]
let reviews=JSON.parse(localStorage.getItem("reviews"))||[]
let messages=JSON.parse(localStorage.getItem("messages"))||[]

/* PREVIEW IMAGE */

document.getElementById("profPhoto").addEventListener("change",function(){

let file=this.files[0]

if(file){
let reader=new FileReader()

reader.onload=function(e){
let img=document.getElementById("preview")
img.src=e.target.result
img.style.display="block"
}

reader.readAsDataURL(file)
}

})

/* ADD PROF */

function addProf(){

let file=document.getElementById("profPhoto").files[0]

if(!profName.value || !profSubject.value || !profCity.value || !profPrice.value || !profWhatsapp.value){
alert("Remplis tous les champs")
return
}

if(!file){
alert("Ajoute une photo")
return
}

let reader=new FileReader()

reader.onload=function(e){

let prof={
name:profName.value,
subject:profSubject.value,
city:profCity.value,
price:profPrice.value,
whatsapp:profWhatsapp.value,
photo:e.target.result
}

profs.push(prof)
localStorage.setItem("profs",JSON.stringify(profs))

alert("✅ Prof ajouté")

profName.value=""
profSubject.value=""
profCity.value=""
profPrice.value=""
profWhatsapp.value=""
preview.style.display="none"

displayProfs()
updateDashboard()

}

reader.readAsDataURL(file)

}

/* AFFICHAGE PROFS */

function displayProfs(){

let html=""

profs.forEach(p=>{
html+=`
<div class="profCard">
<img src="${p.photo}">
<div>
<h3>${p.name}</h3>
<p>${p.subject} - ${p.city}</p>
<p>${p.price}</p>
<a href="https://wa.me/${p.whatsapp}" target="_blank">
<button>WhatsApp</button>
</a>
</div>
</div>
`
})

profResults.innerHTML=html
}

displayProfs()

/* SEARCH */

searchInput.addEventListener("input",function(){

let val=this.value.toLowerCase()
let html=""

profs.forEach(p=>{

if(
p.name.toLowerCase().includes(val) ||
p.subject.toLowerCase().includes(val) ||
p.city.toLowerCase().includes(val)
){

html+=`
<div class="profCard">
<img src="${p.photo}">
<div>
<h3>${p.name}</h3>
<p>${p.subject} - ${p.city}</p>
<p>${p.price}</p>
<a href="https://wa.me/${p.whatsapp}" target="_blank">
<button>WhatsApp</button>
</a>
</div>
</div>
`
}

})

profResults.innerHTML=html

})

/* CHAT */

function sendMessage(){

let text=chatInput.value
if(text==="") return

messages.push(text)
localStorage.setItem("messages",JSON.stringify(messages))

displayChat()
chatInput.value=""
}

function displayChat(){

let html=""

messages.forEach(m=>{
html+=`<div class="message">${m}</div>`
})

chatBox.innerHTML=html

}

displayChat()

/* REVIEWS */

function addReview(){

if(!reviewName.value || !reviewText.value){
alert("Remplis les champs")
return
}

let review={
name:reviewName.value,
text:reviewText.value
}

reviews.push(review)
localStorage.setItem("reviews",JSON.stringify(reviews))

reviewName.value=""
reviewText.value=""

displayReviews()
updateDashboard()

}

function displayReviews(){

let html=""

reviews.forEach(r=>{
html+=`<div class="review"><b>${r.name}</b><br>${r.text}</div>`
})

reviewList.innerHTML=html

}

displayReviews()

/* DASHBOARD */

function updateDashboard(){
countProf.innerText=profs.length
countReview.innerText=reviews.length
}

updateDashboard()

</script>

</body>
</html>
